<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 280" role="img" aria-labelledby="title desc">
  <title id="title">Friendly Droid Buddy</title>
  <desc id="desc">A playful original sci-fi droid illustration with a round head, body panel, and glowing antenna.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#efe6c7"/>
      <stop offset="100%" stop-color="#d7c7a3"/>
    </linearGradient>
    <linearGradient id="metal" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4f6f7"/>
      <stop offset="100%" stop-color="#c3cbd0"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#e69436"/>
      <stop offset="100%" stop-color="#c96e18"/>
    </linearGradient>
    <filter id="glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect x="0" y="0" width="420" height="280" fill="url(#bg)" rx="18"/>

  <ellipse cx="210" cy="242" rx="118" ry="18" fill="#b9a47d" opacity="0.35"/>

  <g transform="translate(210 128)">
    <circle cx="0" cy="-64" r="58" fill="url(#metal)" stroke="#7b868f" stroke-width="4"/>
    <circle cx="-20" cy="-76" r="10" fill="#214a63"/>
    <circle cx="-20" cy="-76" r="5" fill="#81d1ff"/>
    <circle cx="23" cy="-59" r="14" fill="#1f3b4e"/>
    <circle cx="23" cy="-59" r="7" fill="#8ee2ff"/>
    <rect x="-38" y="-28" width="76" height="10" rx="5" fill="#808c96"/>

    <rect x="-78" y="4" width="156" height="132" rx="24" fill="url(#metal)" stroke="#76828b" stroke-width="4"/>
    <rect x="-62" y="22" width="124" height="22" rx="11" fill="url(#accent)"/>
    <circle cx="-38" cy="74" r="10" fill="#5c6872"/>
    <circle cx="0" cy="74" r="10" fill="#5c6872"/>
    <circle cx="38" cy="74" r="10" fill="#5c6872"/>

    <rect x="-96" y="36" width="18" height="64" rx="9" fill="#a2acb3"/>
    <rect x="78" y="36" width="18" height="64" rx="9" fill="#a2acb3"/>

    <rect x="-48" y="126" width="24" height="40" rx="12" fill="#8d989f"/>
    <rect x="24" y="126" width="24" height="40" rx="12" fill="#8d989f"/>

    <line x1="44" y1="-108" x2="78" y2="-138" stroke="#7e8992" stroke-width="4"/>
    <circle cx="84" cy="-143" r="8" fill="#79d0ff" filter="url(#glow)"/>
  </g>
</svg>
